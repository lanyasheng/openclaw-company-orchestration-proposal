# Trading Batch Spec — T0/T1/T2/T3/T4 Queue
# Machine-readable batch specification for trading auto-continue mechanism
# Version: trading_batch_spec_v1
#
# This is the CANONICAL batch spec. Trading repo must sync with this.
# 
# Design principles:
# 1. Default-safe: auto_continue=false unless explicitly enabled
# 2. Stop-at-gate: all production actions require explicit approval
# 3. Machine-readable: can be consumed by orchestrator directly
# 4. Backward-compatible: uses existing handoff_schema/continuation_contract

batch_spec_version: trading_batch_spec_v1
created_at: "2026-03-24T00:00:00+08:00"

metadata:
  owner: "trading"
  scenario: "trading_roundtable_phase1"
  adapter: "trading"
  description: "A 股策略主线执行队列 (T0-T4)"
  reference_doc: "docs/trading-selector-execution-plan-20260324.md"

batches:
  # ============ T0: Rebaseline Plan + Canonical Queue ============
  T0:
    batch_id: "T0"
    name: "Rebaseline Plan + Canonical Queue"
    description: |
      重基线执行计划，定义清晰的批次队列 (T0/T1/T2/T3/T4)
      各 WS 状态用真值词标注，明确 automation 口径
    workstreams:
      - "WS0"  # 500 universe / Selector (done_first_pass)
    prerequisites: []
    required_artifacts:
      - "docs/trading-selector-execution-plan-20260324.md"
    completion_gate_definition:
      pass_criteria:
        - "execution_plan_rebased"
        - "ws_status_labeled"
        - "batch_queue_defined"
      conditional_criteria:
        - "some_ws_status_unclear"
      fail_criteria:
        - "execution_plan_missing"
        - "batch_queue_undefined"
    next_batch_rules:
      - trigger_gate: "PASS"
        next_batch_id: "T1"
        next_batch_description: "WS0/WS7 Closeout — 第一批次收口"
        priority: 10
        dispatch_profile: "generic_subagent"
        executor: "subagent"
      - trigger_gate: "CONDITIONAL"
        next_batch_id: "T0"
        next_batch_description: "Rebaseline Plan — 继续澄清"
        priority: 5
        dispatch_profile: "generic_subagent"
        executor: "subagent"
    safety_gate:
      auto_continue: true  # T0->T1 可自动续批
      stop_at_gate: true   # 但生产动作仍需停止
      production_blockers: []
      require_manual_approval: false
      allowed_dispatch_backends:
        - "subagent"
        - "tmux"
    metadata:
      status: "completed"
      completed_at: "2026-03-24T14:13:00+08:00"

  # ============ T1: WS0/WS7 Closeout ============
  T1:
    batch_id: "T1"
    name: "WS0/WS7 Closeout"
    description: |
      第一批次收口：WS0 (500 universe/selector) + WS7 (merge/push)
      产出 closeout 文档，明确 round verdict / evidence / next batch recommendation
    workstreams:
      - "WS0"  # 500 universe / Selector
      - "WS7"  # Merge/Push/Delivery
    prerequisites:
      - "T0"
    required_artifacts:
      - "docs/audit/trading-t1-ws0-ws7-closeout-2026-03-24.md"
      - "artifacts/selector-acceptance-report.json"
    completion_gate_definition:
      pass_criteria:
        - "closeout_document_created"
        - "round_verdict_clear"
        - "evidence_list_complete"
        - "next_batch_recommendation_clear"
      conditional_criteria:
        - "soft_warnings_present"  # e.g., liquidity flag
        - "push_not_completed"
      fail_criteria:
        - "closeout_document_missing"
        - "round_verdict_fail"
        - "critical_blocker_unresolved"
    next_batch_rules:
      # T1 PASS -> T2 (WS3 Minimal Shadow Delivery Chain)
      - trigger_gate: "PASS"
        next_batch_id: "T2"
        next_batch_description: "WS3 Minimal Shadow Delivery Chain — 最小消息链路"
        priority: 10
        conditions:
          push_completed: true
        dispatch_profile: "coding"
        executor: "claude_code"
      # T1 CONDITIONAL (push not completed) -> T1 (retry closeout)
      - trigger_gate: "CONDITIONAL"
        next_batch_id: "T1"
        next_batch_description: "WS0/WS7 Closeout — 完成 push 收口"
        priority: 5
        dispatch_profile: "generic_subagent"
        executor: "subagent"
      # T1 FAIL -> blocked (manual review required)
      - trigger_gate: "FAIL"
        next_batch_id: null  # null = no auto-continue
        next_batch_description: "Blocked — manual review required"
        priority: 0
    safety_gate:
      auto_continue: true
      stop_at_gate: true
      production_blockers: []
      require_manual_approval: false
      allowed_dispatch_backends:
        - "subagent"
        - "tmux"
    metadata:
      status: "in_progress"
      closeout_document: "docs/audit/trading-t1-ws0-ws7-closeout-2026-03-24.md"

  # ============ T2: WS3 Minimal Shadow Delivery Chain ============
  T2:
    batch_id: "T2"
    name: "WS3 Minimal Shadow Delivery Chain"
    description: |
      盘中主线 — 最小消息链路
      实现 Discord/webhook 发送，创建 smoke test，端到端验证
    workstreams:
      - "WS3"  # 盘中主线
    prerequisites:
      - "T1"
    required_artifacts:
      - "scripts/shadow-intraday/discord_sender.py"
      - "scripts/shadow-intraday/smoke_test.py"
      - "docs/runbooks/ws3-stage1-runbook.md"
    completion_gate_definition:
      pass_criteria:
        - "discord_sender_implemented"
        - "smoke_test_pass"
        - "runbook_created"
      conditional_criteria:
        - "dry_run_only"  # 尚未真实发送
      fail_criteria:
        - "discord_sender_missing"
        - "smoke_test_fail"
        - "delivery_chain_broken"
    next_batch_rules:
      # T2 PASS -> T2.1 (WS3 Shadow Run)
      - trigger_gate: "PASS"
        next_batch_id: "T2.1"
        next_batch_description: "WS3 Shadow Run — 真实盘中观察"
        priority: 10
        dispatch_profile: "interactive_observable"
        executor: "subagent"
      # T2 DRY_RUN_PASS -> T2.1 (允许干跑通过后继续)
      - trigger_gate: "DRY_RUN_PASS"
        next_batch_id: "T2.1"
        next_batch_description: "WS3 Shadow Run — 真实盘中观察"
        priority: 8
        dispatch_profile: "interactive_observable"
        executor: "subagent"
      # T2 CONDITIONAL -> T2 (fix delivery chain)
      - trigger_gate: "CONDITIONAL"
        next_batch_id: "T2"
        next_batch_description: "WS3 Minimal Shadow Delivery Chain — 修复链路"
        priority: 5
        dispatch_profile: "coding"
        executor: "claude_code"
    safety_gate:
      auto_continue: false  # T2->T2.1 涉及真实盘中，默认禁止自动
      stop_at_gate: true    # 必须 stop-at-gate
      production_blockers:
        - "real_message_not_approved"
        - "production_dispatch_not_approved"
      require_manual_approval: true
      allowed_dispatch_backends:
        - "subagent"
        - "tmux"
    metadata:
      status: "pending"

  # ============ T2.1: WS3 Shadow Run ============
  T2.1:
    batch_id: "T2.1"
    name: "WS3 Shadow Run"
    description: |
      盘中主线 — 真实盘中观察（Shadow 模式）
      至少 1 个交易日观察，获取真实盘中数据，生成候选池，发送通知
    workstreams:
      - "WS3"  # 盘中主线
    prerequisites:
      - "T2"
    required_artifacts:
      - "logs/shadow-run-day1.json"
      - "reports/shadow-run-day1-summary.md"
    completion_gate_definition:
      pass_criteria:
        - "real_market_data_acquired"
        - "candidate_pool_generated"
        - "notification_sent"
        - "one_day_observation_complete"
      conditional_criteria:
        - "partial_data"
        - "notification_delayed"
      fail_criteria:
        - "market_data_unavailable"
        - "delivery_chain_failed"
        - "critical_error"
    next_batch_rules:
      # T2.1 PASS -> T3 (WS2 Gate/Shadow)
      - trigger_gate: "PASS"
        next_batch_id: "T3"
        next_batch_description: "WS2 情绪增强 Gate/Shadow"
        priority: 10
        dispatch_profile: "coding"
        executor: "claude_code"
      # T2.1 CONDITIONAL -> T2.1 (continue observation)
      - trigger_gate: "CONDITIONAL"
        next_batch_id: "T2.1"
        next_batch_description: "WS3 Shadow Run — 继续观察"
        priority: 5
        dispatch_profile: "interactive_observable"
        executor: "subagent"
    safety_gate:
      auto_continue: false  # T2.1->T3 涉及情绪增强，默认禁止自动
      stop_at_gate: true
      production_blockers:
        - "shadow_run_not_complete"
        - "gain_report_missing"
      require_manual_approval: true
      allowed_dispatch_backends:
        - "subagent"
        - "tmux"
    metadata:
      status: "pending"

  # ============ T3: WS2 Gate/Shadow ============
  T3:
    batch_id: "T3"
    name: "WS2 Gate/Shadow"
    description: |
      情绪增强 — Gate/Shadow 决策
      情绪数据源 coverage/quality gate 建立，Shadow 运行增益报告
    workstreams:
      - "WS2"  # 情绪增强
    prerequisites:
      - "T2.1"
    required_artifacts:
      - "reports/sentiment-data-audit.md"
      - "reports/shadow-gain-report.md"
      - "docs/decisions/ws2-gate-decision.md"
    completion_gate_definition:
      pass_criteria:
        - "sentiment_data_audit_complete"
        - "shadow_gain_report_positive"
        - "gate_decision_made"
      conditional_criteria:
        - "gain_marginal"
        - "data_coverage_partial"
      fail_criteria:
        - "sentiment_data_unreliable"
        - "shadow_gain_negative"
        - "gate_decision_reject"
    next_batch_rules:
      # T3 PASS (enable) -> T4 (WS5/WS6 Hardening)
      - trigger_gate: "PASS"
        next_batch_id: "T4"
        next_batch_description: "WS5/WS6 Hardening — 反屏蔽/架构分层"
        priority: 10
        conditions:
          gate_decision: "enable"
        dispatch_profile: "coding"
        executor: "claude_code"
      # T3 PASS (shadow only) -> T4
      - trigger_gate: "PASS"
        next_batch_id: "T4"
        next_batch_description: "WS5/WS6 Hardening — 反屏蔽/架构分层"
        priority: 8
        conditions:
          gate_decision: "shadow"
        dispatch_profile: "generic_subagent"
        executor: "subagent"
      # T3 CONDITIONAL -> T3 (more shadow run)
      - trigger_gate: "CONDITIONAL"
        next_batch_id: "T3"
        next_batch_description: "WS2 Gate/Shadow — 继续 Shadow 观察"
        priority: 5
        dispatch_profile: "interactive_observable"
        executor: "subagent"
    safety_gate:
      auto_continue: false  # T3->T4 涉及架构决策，默认禁止自动
      stop_at_gate: true
      production_blockers:
        - "gate_decision_not_final"
      require_manual_approval: true
      allowed_dispatch_backends:
        - "subagent"
        - "tmux"
    metadata:
      status: "pending"

  # ============ T4: WS5/WS6 Hardening ============
  T4:
    batch_id: "T4"
    name: "WS5/WS6 Hardening"
    description: |
      反屏蔽治理 + 架构分层整顿
      Provider 错误分类与重试策略，单一真值入口设计，Legacy 路径淘汰
    workstreams:
      - "WS5"  # 反屏蔽治理
      - "WS6"  # 架构分层整顿
    prerequisites:
      - "T3"
    required_artifacts:
      - "docs/architecture/single-truth-entry.md"
      - "docs/runbooks/provider-retry-strategy.md"
      - "docs/plans/legacy-deprecation-plan.md"
    completion_gate_definition:
      pass_criteria:
        - "provider_error_classification_complete"
        - "single_truth_entry_designed"
        - "legacy_deprecation_plan_created"
      conditional_criteria:
        - "partial_implementation"
      fail_criteria:
        - "architecture_design_flawed"
        - "critical_blocker_unresolved"
    next_batch_rules:
      # T4 PASS -> Done (or T5 if defined)
      - trigger_gate: "PASS"
        next_batch_id: null  # null = queue complete
        next_batch_description: "T0-T4 Queue Complete — Ready for Production"
        priority: 10
      # T4 CONDITIONAL -> T4 (continue hardening)
      - trigger_gate: "CONDITIONAL"
        next_batch_id: "T4"
        next_batch_description: "WS5/WS6 Hardening — 继续整顿"
        priority: 5
        dispatch_profile: "coding"
        executor: "claude_code"
    safety_gate:
      auto_continue: false  # T4 是最后一个 batch，无需自动续批
      stop_at_gate: true
      production_blockers:
        - "hardening_not_complete"
      require_manual_approval: true
      allowed_dispatch_backends:
        - "subagent"
        - "tmux"
    metadata:
      status: "pending"

# ============ Global Configuration ============
global_config:
  # Default safety policy
  default_auto_continue: false
  default_stop_at_gate: true
  default_require_manual_approval: true
  
  # Production blockers (apply to all batches)
  global_production_blockers:
    - "real_git_push_not_approved"
    - "real_webhook_not_approved"
    - "production_dispatch_not_approved"
    - "market_hours_production_not_approved"
  
  # Allowed dispatch backends
  allowed_dispatch_backends:
    - "subagent"
    - "tmux"
  
  # Callback envelope version (must match existing orchestrator)
  callback_envelope_version: "canonical_callback_envelope_v1"
