apiVersion: proposal.openclaw/v0
kind: WorkflowSpecDraft
metadata:
  workflowId: workspace-trading.acceptance-harness-dry-run.v1
  name: 固定候选验收闭环（Acceptance Harness Dry-Run v1）
  owner: main
  status: runtime-aligned-for-p1a-3
  businessRepo: workspace-trading
  runtimeDefinition: examples/workflows/workspace-trading.acceptance-harness.scheduler.json
  runtimeExampleInput: examples/inputs/workspace-trading.acceptance-harness.request.json
  artifactContract: docs/workflows/workspace-trading-acceptance-artifact-contract.md
  scope: offline-only
  sideEffects:
    liveTrading: forbidden
    gatewayMutation: forbidden
    orderPlacement: forbidden
summary:
  objective: >-
    在 workspace-trading 中运行现有 acceptance harness CLI，生成 repo-native
    acceptance artifact/report，并把 terminal/state/callback 收敛为一条固定 workflow。
  rationale:
    - acceptance harness CLI 已存在，今天可执行
    - 输入/输出契约已存在，适合做首条 pilot
    - 不依赖 live trading，不会产生真实交易副作用
trigger:
  type: manual
  requiredInputs:
    - task_id
    - run_label
    - workspace_repo
    - workspace_repo_path
    - input_config_path
    - artifacts_dir
    - reports_dir
    - artifact_json_path
    - report_path
  guards:
    - workspace_repo must equal workspace-trading
    - input_config_path must be allowlisted
    - no live trading or gateway command may appear in execution payload
    - task_id must be unique
nodes:
  - id: init_registry
    type: control.init_registry
  - id: validate_request
    type: control.inline_payload
  - id: dispatch_acceptance_subagent
    type: subagent.local_cli
    timeoutSeconds: 300
  - id: await_terminal
    type: subagent.await_terminal
  - id: collect_and_classify
    type: control.collect_and_classify
    artifactInputContract:
      primaryArtifact: await_terminal.artifacts.artifact_json_path
      optionalFallbacks:
        - request.artifact_json_path
      nestedObjectsRequired:
        - acceptance_manifest
        - acceptance_checklist
      optionalSidecars:
        - await_terminal.artifacts.acceptance_manifest_path
        - await_terminal.artifacts.acceptance_checklist_path
      requiredSummary:
        scenario_count: 4
        dimensions_covered:
          - etf_basket
          - stock_basket
          - oos
          - regime
      businessVerdictPath: acceptance_manifest.verdict_summary.overall_verdict
      allowedBusinessVerdicts:
        - PASS
        - CONDITIONAL
        - FAIL
      mapping:
        completed:
          - terminal_state == completed
          - contract_valid == true
          - business_overall_verdict == PASS
        degraded:
          - terminal_state == completed
          - contract_valid == true
          - business_overall_verdict in [CONDITIONAL, FAIL]
        failed:
          - terminal_state != completed
          - artifact missing
          - manifest missing
          - checklist missing
          - checklist contains FAIL item
          - scenario_count mismatch
          - dimensions_covered mismatch
          - business_overall_verdict invalid
  - id: final_callback
    type: callback.send_once
    payloadFields:
      - task_id
      - workflow_id
      - run_label
      - workflow_state
      - name: business_overall_verdict
        path: steps.collect_and_classify.business_overall_verdict
      - name: candidate_id
        path: steps.collect_and_classify.candidate_id
      - name: artifact_json_path
        path: steps.collect_and_classify.artifact_json_path
      - name: report_path
        path: steps.collect_and_classify.report_path
      - name: child_session_key
        path: steps.collect_and_classify.child_session_key
fanoutJoin:
  controlPlane:
    fanout: none
    join: single-child-only
  businessPlane:
    fixedScenarioDimensions:
      - etf_basket
      - stock_basket
      - oos
      - regime
    joinRule: all four dimensions must be present exactly once in the acceptance artifact summary
artifacts:
  business:
    input_config: research/v2_portfolio/basket_configs/acceptance_harness_v1_sample.json
    json_artifact: artifacts/acceptance/<run-scope>/acceptance_harness_<run_label>.json
    markdown_report: reports/acceptance/<run-scope>/acceptance_harness_<run_label>.md
  controlPlane:
    registry: artifacts/workflow-runs/workspace-trading.acceptance-harness-dry-run.v1/${task_id}/registry.json
    terminal: artifacts/workflow-runs/workspace-trading.acceptance-harness-dry-run.v1/${task_id}/terminal.json
    callback: artifacts/workflow-runs/workspace-trading.acceptance-harness-dry-run.v1/${task_id}/callback.json
    summary: artifacts/workflow-runs/workspace-trading.acceptance-harness-dry-run.v1/${task_id}/summary.md
semantics:
  stateAndCallbackStatusAreSeparated: true
  callbackStatusAllowed:
    - pending
    - sent
    - acked
    - failed
  callbackFailureDoesNotRewriteWorkflowState: true
  timeoutHandling:
    businessMeaning: timeout
    runtimeV1Mapping: terminal_state=timeout + workflow_state=failed
rollback:
  - disable manual dispatch entry for this workflow
  - revert to direct human execution of research/run_acceptance_harness.py
  - generated artifacts may be removed without affecting trading core logic
nonGoals:
  - generic DAG support
  - dynamic fanout
  - multi-strategy parallel orchestration
  - real backtest scenario generation
  - premarket or intraday online trading workflows
